{% macro book_form(book, genres, is_edit=False) %}
<div class="mb-3">
    <label for="title" class="form-label">Название <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="title" name="title"
           value="{{ book.title if book else '' }}" required>
</div>
<div class="mb-3">
    <label for="author" class="form-label">Автор <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="author" name="author"
           value="{{ book.author if book else '' }}" required>
</div>
<div class="row">
    <div class="col-md-4 mb-3">
        <label for="year" class="form-label">Год издания <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="year" name="year"
               value="{{ book.year if book else '' }}" min="1000" max="2100" required>
    </div>
    <div class="col-md-4 mb-3">
        <label for="pages" class="form-label">Объём (стр.) <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="pages" name="pages"
               value="{{ book.pages if book else '' }}" min="1" required>
    </div>
    <div class="col-md-4 mb-3">
        <label for="publisher" class="form-label">Издательство <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="publisher" name="publisher"
               value="{{ book.publisher if book else '' }}" required>
    </div>
</div>
<div class="mb-3">
    <label for="genres" class="form-label">Жанры <span class="text-danger">*</span></label>
    <select class="form-select" id="genres" name="genres" multiple size="5" required>
        {% for genre in genres %}
        <option value="{{ genre.id }}"
            {% if book and genre in book.genres %}selected{% endif %}>
            {{ genre.name }}
        </option>
        {% endfor %}
    </select>
    <div class="form-text">Удерживайте Ctrl (или Cmd на Mac) для выбора нескольких жанров</div>
</div>
<div class="mb-3">
    <label for="short_description" class="form-label">
        Краткое описание <span class="text-danger">*</span>
    </label>
    <textarea class="form-control" id="short_description" name="short_description"
              rows="8" required>{{ book.short_description if book else '' }}</textarea>
    <div class="form-text">Поддерживается разметка Markdown</div>
</div>
{% if not is_edit %}
<div class="mb-3">
    <label for="cover" class="form-label">Обложка <span class="text-danger">*</span></label>
    <input type="file" class="form-control" id="cover" name="cover" accept="image/*" required>
</div>
{% endif %}
{% endmacro %}
